<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>月次日常点検アプリ</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="app-header">
    <h1>月次日常点検記録</h1>
    <div class="toolbar">
      <label>対象月<input type="month" id="month" value="2026-01" /></label>
      <label>車番<input type="text" id="vehicle" placeholder="例: 品川100あ1234" /></label>
      <label>運転者<input type="text" id="driver" placeholder="例: 田中" /></label>
      <button id="loadBtn" type="button">読込</button>
      <button id="saveBtn" type="button">保存</button>
      <span id="status"></span>
    </div>
    <div class="stamp-actions">
      <button data-stamp-target="operationManager" data-stamp-value="岸田" type="button">運行管理者印: 岸田</button>
      <button data-stamp-target="maintenanceManager" data-stamp-value="若本" type="button">整備管理者印: 若本</button>
    </div>
  </header>

  <main class="sheet-wrap">
    <section class="sheet" aria-label="月次日常点検記録表">
      <table id="inspectionTable">
        <thead>
          <tr>
            <th colspan="8" class="company">有限会社シンユウ物流</th>
            <th colspan="20" class="title">月 次 点 検 記 録 表</th>
            <th colspan="2" class="manager-title">運行管理者</th>
            <th colspan="2" class="manager-title">整備管理者</th>
          </tr>
          <tr>
            <th colspan="5" class="month-cell">令和8年 <span id="monthText">1</span>月</th>
            <th colspan="3" class="vehicle-cell">車番: <span id="vehicleText">-</span></th>
            <th colspan="20" class="driver-cell">運転者名（点検者）: <span id="driverText">-</span></th>
            <th colspan="2" rowspan="2" class="stamp-slot" id="operationManagerSlot"></th>
            <th colspan="2" rowspan="2" class="stamp-slot" id="maintenanceManagerSlot"></th>
          </tr>
          <tr>
            <th colspan="4" rowspan="2">点検個所</th>
            <th colspan="4" rowspan="2">点検内容</th>
            <th class="day-label">日</th>
            <th class="day-label" colspan="31">1 - 31</th>
          </tr>
          <tr id="daysRow">
            <th class="dow-label">曜</th>
          </tr>
        </thead>
        <tbody id="inspectionBody"></tbody>
        <tfoot>
          <tr id="maintenanceFooterRow">
            <td colspan="8" class="bottom-label">整備管理者 印</td>
            <td class="day"></td>
          </tr>
        </tfoot>
      </table>
    </section>
  </main>

  <script type="module" src="./main.js"></script>
</body>
</html>
